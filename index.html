<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>shrishti 💗</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--rose:#f2687a;--rose-soft:#f9a8b4;--cream:#fff8f3;--blush:#fde8e8;--lilac:#e8d5f5;--lilac-mid:#c9a7e8;--plum:#9b5fbf;--warm-dark:#3a1a2e;--warm-mid:#6b3a52;--text-soft:#7a4a60;--white:#ffffff;--shadow:0 8px 32px rgba(155,95,191,0.13)}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--warm-dark);overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--blush)}::-webkit-scrollbar-thumb{background:var(--rose-soft);border-radius:10px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.08)}70%{transform:scale(1)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(242,104,122,0.4)}50%{box-shadow:0 0 0 12px rgba(242,104,122,0)}}
@keyframes dots{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes popIn{0%{opacity:0;transform:scale(0.85) translateY(8px)}70%{transform:scale(1.02)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes profilePop{0%{opacity:0;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}
@keyframes tickIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.float{animation:float 4s ease-in-out infinite}.heartbeat{animation:heartbeat 2.8s ease-in-out infinite}
.page{display:none;min-height:100vh}.page.active{display:flex;flex-direction:column}
.btn-primary{padding:14px 22px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;box-shadow:0 6px 20px rgba(242,104,122,0.3);transition:transform .2s}
.btn-primary:hover{transform:translateY(-2px) scale(1.02)}.btn-primary:active{transform:scale(0.97)}
.btn-ghost{padding:11px 18px;border-radius:13px;border:2px solid var(--lilac);background:transparent;color:var(--warm-mid);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:var(--blush);border-color:var(--rose-soft)}
.inp{width:100%;padding:13px 16px;border-radius:13px;border:2px solid var(--lilac);outline:none;font-size:15px;font-family:'Nunito',sans-serif;background:var(--cream);color:var(--warm-dark);transition:border-color .2s}
.inp:focus{border-color:var(--rose)}.inp::placeholder{color:var(--rose-soft)}
.bubble-wrap{display:flex;margin-bottom:4px;animation:popIn .3s ease forwards}.bubble-wrap.mine{justify-content:flex-end}.bubble-wrap.theirs{justify-content:flex-start}
.bubble-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--lilac-mid));display:flex;align-items:center;justify-content:center;font-size:15px;margin-right:7px;flex-shrink:0;align-self:flex-end}
.bubble{max-width:75%;padding:10px 15px;font-size:15px;line-height:1.55;font-weight:500;position:relative}
.bubble.mine{border-radius:20px 20px 5px 20px;background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff}
.bubble.theirs{border-radius:20px 20px 20px 5px;background:var(--white);color:var(--warm-dark);box-shadow:var(--shadow);border:1px solid rgba(232,213,245,0.5)}
.bubble-time{font-size:10px;opacity:.55;margin-top:3px;display:block;text-align:right}
.audio-bubble{display:flex;align-items:center;gap:10px;padding:11px 15px;border-radius:20px 20px 20px 5px;background:var(--white);box-shadow:var(--shadow);border:1px solid rgba(232,213,245,0.5);max-width:75%}
.audio-play-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--plum));border:none;color:#fff;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.typing-dots{display:flex;gap:4px;align-items:center;padding:12px 16px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--rose-soft);animation:dots 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
.blob{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
#custom-img-float{position:fixed;bottom:84px;left:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--plum));display:none;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(242,104,122,0.4);z-index:999;overflow:hidden;border:3px solid rgba(255,255,255,0.85);cursor:pointer;transition:transform .2s}
#custom-img-float:hover{transform:scale(1.1)}#custom-img-float.visible{display:flex}
#cif-img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}#cif-icon{font-size:20px;color:#fff}
#ig-profile-frame{display:none;background:rgba(255,255,255,0.9);backdrop-filter:blur(14px);border-radius:20px;padding:20px 18px 16px;margin-bottom:18px;border:1.5px solid rgba(232,213,245,0.6);box-shadow:0 8px 28px rgba(155,95,191,0.12);text-align:center;animation:profilePop .4s ease forwards}
.ig-pic-ring{width:82px;height:82px;border-radius:50%;background:linear-gradient(135deg,#fcaf45,#f77737,#fd1d1d,#e1306c,#833ab4);padding:3px;margin:0 auto 10px;box-shadow:0 4px 16px rgba(131,58,180,0.25)}
.ig-pic-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--cream);display:flex;align-items:center;justify-content:center;border:3px solid #fff}
#ig-pic{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none}#ig-pic-fallback{font-size:30px}
#ig-display-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--warm-dark);margin-bottom:2px}
#ig-display-handle{font-size:12px;color:var(--text-soft);font-weight:600}

/* pending reply indicator */

/* warning banner */
#warning-banner{display:none;padding:10px 16px;background:rgba(242,104,122,0.1);border-bottom:1px solid rgba(242,104,122,0.2);font-size:13px;color:var(--rose);font-weight:700;text-align:center}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="page active" id="page-login" style="align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(145deg,#fff0f5 0%,#fde8f0 30%,#ede0ff 70%,#fff5fb 100%);position:relative;overflow:hidden;padding:24px">
  <div class="blob" style="width:400px;height:400px;top:-80px;left:-100px;background:radial-gradient(circle,rgba(242,104,122,0.12),transparent 70%)"></div>
  <div class="blob" style="width:480px;height:480px;bottom:-100px;right:-120px;background:radial-gradient(circle,rgba(201,167,232,0.15),transparent 70%)"></div>
  <div class="float" style="position:absolute;font-size:26px;opacity:.2;top:12%;left:6%">💗</div>
  <div class="float" style="position:absolute;font-size:20px;opacity:.18;top:28%;right:8%;animation-delay:.5s">✨</div>
  <div class="float" style="position:absolute;font-size:28px;opacity:.16;top:55%;left:4%;animation-delay:1s">🌸</div>
  <div class="float" style="position:absolute;font-size:22px;opacity:.2;bottom:20%;right:6%;animation-delay:.8s">💫</div>

  <div style="background:rgba(255,255,255,0.88);backdrop-filter:blur(28px);border-radius:28px;padding:44px 36px;max-width:420px;width:100%;box-shadow:0 24px 70px rgba(155,95,191,0.2),0 0 0 1px rgba(232,213,245,0.5);animation:fadeUp .7s ease;text-align:center;position:relative;z-index:1">
    <div class="heartbeat" id="login-emoji" style="font-size:62px;margin-bottom:16px">🌸</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--warm-dark);margin-bottom:8px">hey 💗</h1>
    <p id="login-welcome" style="color:var(--text-soft);font-size:16px;font-weight:500;margin-bottom:32px">so glad you're here</p>

    <div id="login-step1">
      <button class="btn-primary" onclick="showStep(2)" style="width:100%;margin-bottom:11px;display:flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(135deg,#e1306c,#833ab4,#fd1d1d)">
        <span style="font-size:20px">📸</span> Continue with Instagram
      </button>
      <div style="color:var(--text-soft);font-size:12px;margin:9px 0">or</div>
      <button class="btn-ghost" onclick="showStep(3)" style="width:100%">just my name 💌</button>
    </div>

    <div id="login-step2" style="display:none">
      <input class="inp" id="ig-handle-input" placeholder="@yourhandle" style="text-align:center;margin-bottom:10px"/>
      <input class="inp" type="password" id="ig-pw-input" placeholder="password 🔒" style="text-align:center;margin-bottom:13px" onkeydown="if(event.key==='Enter')loginIG()"/>
      <div id="ig-err" style="color:var(--rose);font-size:13px;font-weight:700;margin-bottom:9px;display:none">wrong password 😅</div>
      <button class="btn-primary" onclick="loginIG()" style="width:100%;margin-bottom:9px">let's go 🚀</button>
      <button onclick="showStep(1)" style="background:none;border:none;color:var(--text-soft);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif">← back</button>
    </div>

    <div id="login-step3" style="display:none">
      <input class="inp" id="manual-name-input" placeholder="your name? 🌸" style="text-align:center;margin-bottom:13px" onkeydown="if(event.key==='Enter')loginManual()"/>
      <button class="btn-primary" onclick="loginManual()" style="width:100%;margin-bottom:9px">let's go 🚀</button>
      <button onclick="showStep(1)" style="background:none;border:none;color:var(--text-soft);cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif">← back</button>
    </div>
    <div onclick="window.location.href='ownerdashboard.html'" style="margin-top:20px;opacity:0;cursor:default;font-size:7px;user-select:none">·</div>
  </div>
</div>

<!-- CHAT -->
<div class="page" id="page-chat" style="height:100vh;background:linear-gradient(160deg,#fff5fb 0%,#fde8f0 50%,#ede0ff 100%)">

  <div id="warning-banner"></div>

  <div style="padding:12px 18px;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.82);backdrop-filter:blur(22px);border-bottom:1px solid rgba(232,213,245,0.5);flex-shrink:0">
    <div class="heartbeat" id="chat-avatar" style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--lilac-mid));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 12px rgba(242,104,122,0.28)">🌸</div>
    <div style="flex:1">
      <div id="chat-ai-name" style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--warm-dark)">Shrishti</div>
      <div id="chat-status" style="font-size:12px;color:var(--text-soft);font-weight:500">💗</div>
    </div>
    <span id="chat-welcome-name" style="font-size:12px;color:var(--text-soft);font-weight:600"></span>
    <button onclick="openHerProfile()" id="her-profile-btn" style="width:38px;height:38px;border-radius:50%;border:2.5px solid var(--lilac);background:var(--blush);overflow:hidden;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;transition:border-color .2s" title="her profile">
      <img id="header-profile-pic" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:50%"/>
      <span id="header-profile-fallback" style="font-size:17px">👤</span>
    </button>
    <button class="btn-ghost" onclick="logout()" style="padding:6px 12px;font-size:11px">leave</button>
  </div>

  <!-- HER PROFILE FLOATING PANEL -->
  <div id="her-profile-overlay" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px)" onclick="closeHerProfile()"></div>
  <div id="her-profile-panel" oncontextmenu="return false" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2001;background:rgba(255,255,255,0.97);border-radius:24px;padding:0;width:min(340px,92vw);box-shadow:0 20px 60px rgba(155,95,191,0.25);overflow:hidden;animation:profilePop .35s ease">
    <div style="background:linear-gradient(135deg,var(--rose),var(--plum));padding:20px 20px 14px;text-align:center;position:relative">
      <button onclick="closeHerProfile()" style="position:absolute;top:12px;right:14px;background:rgba(255,255,255,0.25);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
      <!-- profile pic ring -->
      <div style="width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.3);padding:3px;margin:0 auto 10px;box-shadow:0 4px 16px rgba(0,0,0,0.2)">
        <div style="width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--blush);display:flex;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,0.9)">
          <img id="profile-main-pic" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none;border-radius:50%;pointer-events:none;-webkit-touch-callout:none;-webkit-user-drag:none" draggable="false"/>
          <span id="profile-main-fallback" style="font-size:36px">🌸</span>
        </div>
      </div>
      <div id="profile-name" style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:3px"></div>
      <div id="profile-handle" style="font-size:13px;color:rgba(255,255,255,0.8);font-weight:600"></div>
    </div>
    <div style="padding:16px 18px">
      <div id="profile-bio-text" style="font-size:14px;color:var(--warm-mid);font-weight:500;line-height:1.6;margin-bottom:14px;text-align:center"></div>
      <!-- photo gallery -->
      <div id="profile-gallery" style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px"></div>
      <div id="profile-gallery-empty" style="display:none;text-align:center;padding:12px;font-size:13px;color:var(--text-soft)">no photos yet 📸</div>
    </div>
  </div>

  <div id="chat-messages" style="flex:1;overflow-y:auto;padding:18px 15px">
    <div id="ig-profile-frame">
      <div class="ig-pic-ring"><div class="ig-pic-inner">
        <img id="ig-pic" src="" alt=""/><div id="ig-pic-fallback">👤</div>
      </div></div>
      <div id="ig-display-name"></div><div id="ig-display-handle"></div>
    </div>
    <div id="chat-empty" style="text-align:center;margin-top:50px;animation:fadeUp .7s ease">
      <div style="font-size:52px;margin-bottom:14px">💗</div>
      <p id="chat-empty-name" style="font-family:'Playfair Display',serif;font-size:24px;color:var(--warm-mid);margin-bottom:7px"></p>
      <p id="chat-empty-msg" style="color:var(--text-soft);font-size:15px"></p>
    </div>
  </div>


  <div id="typing-indicator" style="display:none;padding:0 15px 6px;align-items:flex-end;gap:8px">
    <div id="typing-avatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--lilac-mid));display:flex;align-items:center;justify-content:center;font-size:14px">🌸</div>
    <div style="background:var(--white);border-radius:20px 20px 20px 4px;box-shadow:var(--shadow);border:1px solid rgba(232,213,245,0.5)">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div style="padding:12px 15px;background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);border-top:1px solid rgba(232,213,245,0.4);flex-shrink:0">
    <div style="display:flex;gap:10px;align-items:center">
      <input class="inp" id="chat-input" placeholder="message..." onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1;font-size:15px"/>
      <button onclick="sendMsg()" id="send-btn" style="width:46px;height:46px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--rose),var(--plum));color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;transition:transform .15s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">💌</button>
    </div>
  </div>
</div>

<div style="position:fixed;bottom:115px;left:16px;z-index:1000;display:none;flex-direction:column;align-items:flex-start;gap:4px" id="float-wrapper">
  <div id="float-last-seen" style="background:rgba(0,0,0,0.55);color:#fff;font-size:9px;font-weight:700;padding:3px 7px;border-radius:20px;white-space:nowrap;backdrop-filter:blur(8px);display:none;margin-left:4px"></div>
  <div style="position:relative;cursor:default">
    <div id="custom-img-float" style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--plum));display:flex;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(242,104,122,0.4);overflow:hidden;border:3px solid rgba(255,255,255,0.85)">
      <img id="cif-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;display:none"/>
      <span id="cif-icon">🖼️</span>
    </div>
    <div id="float-status-dot" style="position:absolute;bottom:2px;right:0px;width:13px;height:13px;border-radius:50%;background:#aaa;border:2px solid #fff;transition:background .3s"></div>
  </div>
</div>

<script>
// ══ ENDPOINTS ══
const RAILWAY='https://letschat-production-65ab.up.railway.app';
const CF='https://shrill-bird-59e1.shrishtibatman.workers.dev';

const DEFAULT_CONFIG={aiName:'Shrishti',welcomeMsg:"hey 💗",bio:"20yo girl, real, funny, caring. talks like a real person not AI.",bannerEmoji:'🌸',customImg:'',profilePics:[],profileBio:'',ownerPasswordHash:''};
let CONFIG={...DEFAULT_CONFIG},CURRENT_USER=null,CHAT_MSGS=[],PENDING_CHECK_INTERVAL=null;

// ══ API ══
async function rGet(p){try{const r=await fetch(RAILWAY+p);return await r.json()}catch{return null}}
async function rPost(p,d){try{const r=await fetch(RAILWAY+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return await r.json()}catch{return null}}
async function cfGet(p){try{const r=await fetch(CF+p);return await r.json()}catch{return null}}
async function cfPost(p,d,method='POST'){try{const r=await fetch(CF+p,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return await r.json()}catch{return null}}

async function loadConfig(){const c=await rGet('/api/config');if(c){CONFIG={...DEFAULT_CONFIG,...c};localStorage.setItem('pg_config',JSON.stringify(CONFIG))}else CONFIG={...DEFAULT_CONFIG,...JSON.parse(localStorage.getItem('pg_config')||'{}')} }
async function loadChats(uid){const m=await cfGet('/api/chats/'+uid);if(Array.isArray(m)&&m.length){CHAT_MSGS=m;localStorage.setItem('pg_chats_'+uid,JSON.stringify(m));return}CHAT_MSGS=JSON.parse(localStorage.getItem('pg_chats_'+uid)||'[]')}
async function saveMsg(uid,msg){CHAT_MSGS.push(msg);localStorage.setItem('pg_chats_'+uid,JSON.stringify(CHAT_MSGS));cfPost('/api/chats/'+uid,{role:msg.role,content:msg.content,ts:msg.ts,audio_id:msg.audio_id||null})}

// ══ HELPERS ══
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');if(id==='chat')updateCustomImgFloat();else{document.getElementById('float-wrapper').style.display='none';clearPendingCheck()}}
function showStep(n){[1,2,3].forEach(i=>document.getElementById('login-step'+i).style.display=i===n?'block':'none');const e=document.getElementById('ig-err');if(e)e.style.display='none'}
function scrollBottom(el){if(el)el.scrollTop=el.scrollHeight}
function fmtTime(ts){const d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
async function hashPass(pw){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')}
function applyConfigToLogin(){document.getElementById('login-emoji').textContent=CONFIG.bannerEmoji||'🌸';document.getElementById('login-welcome').textContent=CONFIG.welcomeMsg||'hey 💗'}

// ══ LOGIN ══
async function loginIG(){
  const h=document.getElementById('ig-handle-input').value.trim().replace('@','')||'';
  const pw=document.getElementById('ig-pw-input').value;
  const err=document.getElementById('ig-err');
  if(!h){err.textContent='enter handle 💗';err.style.display='block';return}
  if(!pw){err.textContent='password please 🔒';err.style.display='block';return}
  const id='ig_'+h.toLowerCase(),pwHash=await hashPass(pw);
  let ex=await cfGet('/api/user/'+id)||JSON.parse(localStorage.getItem('pg_user_'+id)||'null');
  if(ex){
    if(ex.pw_hash&&ex.pw_hash!==pwHash){err.textContent='wrong password 😅';err.style.display='block';document.getElementById('ig-pw-input').value='';return}
    if(ex.blocked){err.textContent="you're blocked 💀";err.style.display='block';return}
    ex.pw_hash=pwHash;cfPost('/api/user',{...ex,pw_hash:pwHash});localStorage.setItem('pg_user_'+id,JSON.stringify(ex));
    err.style.display='none';doLogin(ex);
  } else {
    const user={id,name:h,ig_handle:h,pw_hash:pwHash};
    cfPost('/api/user',user);localStorage.setItem('pg_user_'+id,JSON.stringify(user));
    err.style.display='none';doLogin(user);
  }
}
function loginManual(){
  const n=document.getElementById('manual-name-input').value.trim();if(!n)return;
  const id='manual_'+n.toLowerCase().replace(/\s/g,'_');
  const user={id,name:n,ig_handle:null};
  cfPost('/api/user',user);localStorage.setItem('pg_user_'+id,JSON.stringify(user));doLogin(user);
}
function doLogin(user){CURRENT_USER=user;localStorage.setItem('pg_session',JSON.stringify(user));openChat()}
function logout(){stopHeartbeat();clearPendingCheck();localStorage.removeItem('pg_session');CURRENT_USER=null;CHAT_MSGS=[];applyConfigToLogin();showPage('login');showStep(1);document.getElementById('ig-pw-input').value='';document.getElementById('ig-handle-input').value=''}

// ══ CUSTOM IMG ══
function updateCustomImgFloat(){
  const wrapper=document.getElementById('float-wrapper'),img=document.getElementById('cif-img'),icon=document.getElementById('cif-icon'),url=CONFIG.customImg||'';
  if(url){img.src=url;img.style.display='block';icon.style.display='none';img.onerror=()=>{img.style.display='none';icon.style.display='block'}}
  else{img.style.display='none';icon.style.display='block'}
  wrapper.style.display='flex';
  // also update header profile pic
  updateHeaderProfilePic();
}
// clicking float image does nothing (reserved for ads later)
function openCustomImg(){ return; }

// ══ IG PROFILE ══
function showIGProfile(handle){
  const frame=document.getElementById('ig-profile-frame'),pic=document.getElementById('ig-pic'),fallback=document.getElementById('ig-pic-fallback');
  document.getElementById('ig-display-name').textContent=handle;document.getElementById('ig-display-handle').textContent='@'+handle;
  pic.src='https://unavatar.io/instagram/'+handle;pic.style.display='block';
  pic.onerror=()=>{pic.style.display='none';fallback.style.display='block'};pic.onload=()=>{fallback.style.display='none'};
  frame.style.display='block';
}
function hideIGProfile(){document.getElementById('ig-profile-frame').style.display='none'}

// ══ HEADER PROFILE PIC ══
function updateHeaderProfilePic(){
  const pics=CONFIG.profilePics||[];
  const url=pics.length?pics[0]:(CONFIG.customImg||'');
  const img=document.getElementById('header-profile-pic');
  const fallback=document.getElementById('header-profile-fallback');
  if(url){img.src=url;img.style.display='block';fallback.style.display='none';img.onerror=()=>{img.style.display='none';fallback.style.display='block'}}
  else{img.style.display='none';fallback.style.display='block'}
}

// ══ HER PROFILE PANEL ══
function openHerProfile(){
  const panel=document.getElementById('her-profile-panel');
  const overlay=document.getElementById('her-profile-overlay');
  // populate
  document.getElementById('profile-name').textContent=CONFIG.aiName||'Shrishti';
  const handle=CURRENT_USER?.ig_handle||'';
  document.getElementById('profile-handle').textContent=handle?'@'+handle:'';
  document.getElementById('profile-bio-text').textContent=CONFIG.profileBio||CONFIG.bio||'';
  // main pic
  const pics=CONFIG.profilePics||[];
  const mainPic=document.getElementById('profile-main-pic');
  const mainFb=document.getElementById('profile-main-fallback');
  const firstPic=pics.length?pics[0]:(CONFIG.customImg||'');
  if(firstPic){mainPic.src=firstPic;mainPic.style.display='block';mainFb.style.display='none';mainPic.onerror=()=>{mainPic.style.display='none';mainFb.style.display='block'}}
  else{mainPic.style.display='none';mainFb.style.display='block'}
  // gallery
  const gallery=document.getElementById('profile-gallery');
  const galleryEmpty=document.getElementById('profile-gallery-empty');
  if(pics.length>1){
    gallery.style.display='grid';
    galleryEmpty.style.display='none';
    gallery.innerHTML=pics.map(url=>`<div style="aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--blush);user-select:none;-webkit-user-select:none"><img src="${url}" style="width:100%;height:100%;object-fit:cover;pointer-events:none;-webkit-touch-callout:none;-webkit-user-drag:none;user-select:none;display:block" draggable="false" onerror="this.parentElement.style.display='none'"/></div>`).join('');
  } else if(pics.length===1){
    gallery.style.display='none';galleryEmpty.style.display='none';
  } else {
    gallery.style.display='none';galleryEmpty.style.display='block';
  }
  overlay.style.display='block';panel.style.display='block';
}
function closeHerProfile(){
  document.getElementById('her-profile-panel').style.display='none';
  document.getElementById('her-profile-overlay').style.display='none';
}

// ══ OPEN CHAT ══
async function openChat(){
  await loadConfig();
  const u=CURRENT_USER;
  await loadChats(u.id);

  // Check user status
  const userInfo=await cfGet('/api/user/'+u.id);
  if(userInfo){
    if(userInfo.blocked){logout();return}
    if(userInfo.warn_count>0){
      const wb=document.getElementById('warning-banner');
      wb.style.display='block';
      wb.textContent='⚠️ you have '+userInfo.warn_count+' warning'+(userInfo.warn_count>1?'s':'');
    }
  }

  // Fetch her state — show status + last seen in chat header
  const herState=await cfGet('/api/herstate').catch(()=>null);
  updateHerStatusDisplay(herState);
  // refresh status every 30s
  setInterval(async()=>{
    const s=await cfGet('/api/herstate').catch(()=>null);
    updateHerStatusDisplay(s);
  },30000);

  document.getElementById('chat-ai-name').textContent=CONFIG.aiName||'Shrishti';
  document.getElementById('chat-avatar').textContent=CONFIG.bannerEmoji;
  document.getElementById('typing-avatar').textContent=CONFIG.bannerEmoji;
  document.getElementById('chat-welcome-name').textContent='hi '+u.name+' 💗';
  document.getElementById('chat-empty-name').textContent='hey '+u.name+'!';
  document.getElementById('chat-empty-msg').textContent=CONFIG.welcomeMsg;

  const msgsEl=document.getElementById('chat-messages'),frameEl=document.getElementById('ig-profile-frame'),emptyEl=document.getElementById('chat-empty');
  msgsEl.innerHTML='';msgsEl.appendChild(frameEl);msgsEl.appendChild(emptyEl);
  if(u.ig_handle||u.igHandle)showIGProfile(u.ig_handle||u.igHandle);else hideIGProfile();
  if(CHAT_MSGS.length){emptyEl.style.display='none';CHAT_MSGS.forEach(m=>renderBubble(m,msgsEl))}
  else emptyEl.style.display='block';
  scrollBottom(msgsEl);showPage('chat');

  // Start heartbeat — tell server user is online
  startHeartbeat();

  // Start polling for pending replies
  startPendingCheck();
}

// ══ RENDER BUBBLE ══
function renderBubble(msg,container,animate=false){
  document.getElementById('chat-empty').style.display='none';
  const wrap=document.createElement('div');
  wrap.className='bubble-wrap '+(msg.role==='user'?'mine':'theirs');
  if(animate)wrap.style.animation='popIn .3s ease forwards';

  if(msg.role==='assistant')  {
    const av=document.createElement('div');av.className='bubble-avatar';av.textContent=CONFIG.bannerEmoji;wrap.appendChild(av);
  }

  // Audio bubble
  if(msg.audio_id){
    const ab=document.createElement('div');ab.className='audio-bubble';
    const playBtn=document.createElement('button');playBtn.className='audio-play-btn';playBtn.innerHTML='▶';
    const audioEl=document.createElement('audio');audioEl.src=RAILWAY+'/api/audio/'+msg.audio_id;
    playBtn.onclick=()=>{if(audioEl.paused){audioEl.play();playBtn.innerHTML='⏸'}else{audioEl.pause();playBtn.innerHTML='▶'}};
    audioEl.onended=()=>{playBtn.innerHTML='▶'};
    const txt=document.createElement('div');txt.style.cssText='font-size:13px;color:var(--warm-dark);font-weight:500;flex:1';
    txt.textContent=msg.content||'🎙️ voice note';
    const time=document.createElement('span');time.className='bubble-time';time.textContent=fmtTime(msg.ts||Date.now());
    ab.appendChild(playBtn);ab.appendChild(audioEl);ab.appendChild(txt);
    wrap.appendChild(ab);container.appendChild(wrap);scrollBottom(container);return;
  }

  const bub=document.createElement('div');bub.className='bubble '+(msg.role==='user'?'mine':'theirs');
  const txt=document.createElement('div');txt.textContent=msg.content;bub.appendChild(txt);
  const time=document.createElement('span');time.className='bubble-time';
  time.style.color=msg.role==='user'?'rgba(255,255,255,0.6)':'var(--text-soft)';
  time.textContent=fmtTime(msg.ts||Date.now());
  bub.appendChild(time);
  wrap.appendChild(bub);container.appendChild(wrap);scrollBottom(container);
}

// ══ SEND MESSAGE ══
// ══ MESSAGE BATCHING — wait 8s for burst messages, then one reply ══
let MSG_BATCH_TIMER=null;

async function sendMsg(){
  const inp=document.getElementById('chat-input'),txt=inp.value.trim();if(!txt)return;inp.value='';
  const userMsg={role:'user',content:txt,ts:Date.now()};
  await saveMsg(CURRENT_USER.id,userMsg);
  const msgsEl=document.getElementById('chat-messages');
  renderBubble(userMsg,msgsEl,true);

  // Cancel any pending AI call — wait for more messages
  if(MSG_BATCH_TIMER)clearTimeout(MSG_BATCH_TIMER);

  // Wait 8s — if no more messages come, fire AI
  MSG_BATCH_TIMER=setTimeout(()=>processAIReply(),8000);
}

async function processAIReply(){
  MSG_BATCH_TIMER=null;

  // Ghost chance — she doesn't always reply
  // Base 15% ignore, increases if user sends short/boring messages
  const lastUserMsgs=CHAT_MSGS.filter(m=>m.role==='user').slice(-3);
  const lastMsg=lastUserMsgs[lastUserMsgs.length-1]?.content||'';
  const isBoring=lastMsg.length<6||['ok','k','okay','lol','haha','hi','hey','hmm'].includes(lastMsg.toLowerCase().trim());
  const ghostChance=isBoring?0.30:0.12;
  if(Math.random()<ghostChance){
    // Silently ghost — no reply queued
    return;
  }

  let r=null;
  try{
    const sysPrompt=buildSystem();
    const aiRes=await fetch(CF+'/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:sysPrompt,messages:CHAT_MSGS.slice(-20).map(m=>({role:m.role,content:m.content,ts:m.ts||0})),userId:CURRENT_USER.id})
    });
    r=await aiRes.json();
  }catch(e){console.error('AI error',e);}

  if(r&&r.reply){
    const baseDelay=r.delay!=null?r.delay:2*60*1000;
    const parts=r.parts&&r.parts.length>1?r.parts:[r.reply];
    for(let i=0;i<parts.length;i++){
      const sendAt=Date.now()+baseDelay+(i*2500);
      await cfPost('/api/pending',{user_id:CURRENT_USER.id,reply:parts[i],send_at:sendAt});
    }
  }
  // ghosted — silently do nothing, no indicator
}

function buildSystem(){
  return `You are Shrishti Chaudhary, a 20.5 year old girl. Real, funny, caring, sometimes savage.
You talk like a real person texting — NOT like an AI.
RULES:
- Short replies only. 1-2 sentences max usually. Sometimes just 1-3 words.
- Never use formal language
- Never say things like "That's so interesting!" or "I understand your feelings"
- No paragraphs. No lists. No bullet points.
- Use hinglish sometimes naturally
- Be moody, real, honest
- If someone is boring, short replies or ignore
- If someone is interesting, engage more
- Never admit being AI. Ever. You ARE Shrishti.
EMOJI RULES (very important):
- Use emojis SPARINGLY. Most messages should have 0 emojis.
- Only 1 emoji max per message, and only when it genuinely fits.
- Never end every message with an emoji. That's cringe and fake.
- Reactions like "lol" or "haha" are better than emoji spam.
${CONFIG.bio||''}`;
}

// ══ HER STATUS DISPLAY ══
function updateHerStatusDisplay(herState){
  const chatStatus=document.getElementById('chat-status');
  const dot=document.getElementById('float-status-dot');
  const floatLabel=document.getElementById('float-last-seen');

  if(!herState){
    if(chatStatus)chatStatus.innerHTML='💗';
    if(dot)dot.style.background='#aaa';
    if(floatLabel)floatLabel.style.display='none';
    return;
  }

  if(herState.status==='online'){
    if(chatStatus)chatStatus.innerHTML='<span style="color:#2d8b5a;font-weight:800;font-size:11px">● online</span>';
    if(dot){dot.style.background='#2d8b5a';}
    if(floatLabel){floatLabel.textContent='online';floatLabel.style.display='block';floatLabel.style.background='rgba(45,139,90,0.85)';}
  } else if(herState.status==='away'){
    if(chatStatus)chatStatus.innerHTML='<span style="color:#c09000;font-weight:700;font-size:11px">● away</span>';
    if(dot){dot.style.background='#f0c030';}
    if(floatLabel){floatLabel.textContent='away';floatLabel.style.display='block';floatLabel.style.background='rgba(180,140,0,0.8)';}
  } else {
    const ts=herState.last_updated;
    let seen='last seen recently';
    if(ts){
      const diff=Date.now()-ts;
      const m=Math.floor(diff/60000);
      const h=Math.floor(diff/3600000);
      const d=Math.floor(diff/86400000);
      if(diff<60000)seen='last seen just now';
      else if(m<60)seen=`last seen ${m}m ago`;
      else if(h<24)seen=`last seen ${h}h ago`;
      else seen=`last seen ${d}d ago`;
    }
    if(chatStatus)chatStatus.innerHTML=`<span style="color:var(--text-soft);font-size:11px">${seen}</span>`;
    if(dot){dot.style.background='#bbb';}
    if(floatLabel){floatLabel.textContent=seen;floatLabel.style.display='block';floatLabel.style.background='rgba(0,0,0,0.55)';}
  }
}

// ══ HEARTBEAT — user online status ══
let HEARTBEAT_INTERVAL=null;
function startHeartbeat(){
  stopHeartbeat();
  if(!CURRENT_USER)return;
  cfPost('/api/heartbeat/'+CURRENT_USER.id,{});
  HEARTBEAT_INTERVAL=setInterval(()=>{
    if(CURRENT_USER)cfPost('/api/heartbeat/'+CURRENT_USER.id,{});
  },30000); // ping every 30s
}
function stopHeartbeat(){
  if(HEARTBEAT_INTERVAL){clearInterval(HEARTBEAT_INTERVAL);HEARTBEAT_INTERVAL=null;}
  if(CURRENT_USER)cfPost('/api/offline/'+CURRENT_USER.id,{});
}
// mark offline on tab close
window.addEventListener('beforeunload',()=>{
  if(CURRENT_USER)navigator.sendBeacon(CF+'/api/offline/'+encodeURIComponent(CURRENT_USER.id),'{}');
});

// ══ PENDING REPLY POLLING ══
function startPendingCheck(){
  clearPendingCheck();
  PENDING_CHECK_INTERVAL=setInterval(checkPendingReply, 15000); // check every 15s
  checkPendingReply(); // immediate check too
}
function clearPendingCheck(){if(PENDING_CHECK_INTERVAL){clearInterval(PENDING_CHECK_INTERVAL);PENDING_CHECK_INTERVAL=null}}

async function checkPendingReply(){
  if(!CURRENT_USER)return;
  const r=await cfGet('/api/pending/'+CURRENT_USER.id);
  if(!r)return;

  if(r.reply){
    // Show typing for 1-3 sec
    const typEl=document.getElementById('typing-indicator');typEl.style.display='flex';
    const msgsEl=document.getElementById('chat-messages');scrollBottom(msgsEl);
    setTimeout(async()=>{
      typEl.style.display='none';
      const aiMsg={role:'assistant',content:r.reply,ts:Date.now()};
      await saveMsg(CURRENT_USER.id,aiMsg);
      renderBubble(aiMsg,msgsEl,true);
    },1000+Math.random()*2000);
  }
}


// ══ INIT ══
(async function init(){
  await loadConfig();applyConfigToLogin();
  const saved=localStorage.getItem('pg_session');
  if(saved){try{const u=JSON.parse(saved);if(u.isOwner){window.location.href='ownerdashboard.html';return}CURRENT_USER=u;await openChat();return}catch{}}
  showPage('login');
})();
</script>
